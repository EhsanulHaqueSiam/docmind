apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: rag-api
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
        run.googleapis.com/cpu-throttling: "true"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: gcr.io/PROJECT_ID/rag-api:latest
          ports:
            - containerPort: 8000
          resources:
            limits:
              memory: 2Gi
              cpu: "2"
          env:
            - name: STORAGE_MODE
              value: gcs
            - name: QDRANT_URL
              value: https://your-cluster.cloud.qdrant.io
            - name: LOG_LEVEL
              value: info
            - name: MAX_UPLOAD_SIZE_MB
              value: "100"
          envFrom:
            - secretRef:
                name: rag-secrets
