[tools]
python = "3.12"
uv = "latest"

[env]
_.file = ".env"

[tasks.dev]
description = "Start development server (requires qdrant running)"
run = "uv run uvicorn src.main:app --reload --host 0.0.0.0 --port 8000"

[tasks.up]
description = "Start all services with Docker Compose"
run = "docker compose up -d"

[tasks.down]
description = "Stop all services"
run = "docker compose down"

[tasks.logs]
description = "Tail application logs"
run = "docker compose logs -f docmind"

[tasks.qdrant]
description = "Start only Qdrant (for local dev without Docker app)"
run = "docker compose up -d qdrant"

[tasks.dev-all]
description = "Start Qdrant in Docker + local dev server with reload"
run = """
docker compose up -d qdrant
echo "Waiting for Qdrant..."
until curl -sf http://localhost:6333/healthz > /dev/null 2>&1; do sleep 1; done
echo "Qdrant ready. Starting app..."
uv run uvicorn src.main:app --reload --host 0.0.0.0 --port 8000
"""

[tasks.ingest]
description = "Trigger manual ingestion of docs/"
run = "curl -s -X POST http://localhost:8000/api/v1/documents/ingest | python -m json.tool"

[tasks.health]
description = "Check service health"
run = "curl -s http://localhost:8000/api/v1/health | python -m json.tool"

[tasks.install]
description = "Install dependencies"
run = "uv sync"

[tasks.build]
description = "Build Docker image"
run = "docker build -t docmind-api ."

[tasks.lint]
description = "Run linter"
run = "uv run ruff check src/"

[tasks.format]
description = "Format code"
run = "uv run ruff format src/"
